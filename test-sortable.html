<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Sortable Test</title>
<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.2/Sortable.min.js"></script>
<style>
.list { margin: 20px; padding: 0; list-style: none; }
.item { padding: 12px; margin: 4px 0; border: 1px solid #ccc; background: #fff; cursor: grab; }
.item.meal { background: #fff3e0; border-color: #ffcc80; }
.handle { color: #999; cursor: grab; margin-right: 8px; }
</style></head><body>
<h2>Test 1: Simple (no handle)</h2>
<div class="list" id="list1">
  <div class="item">Regular Item A</div>
  <div class="item meal">Meal Item B</div>
  <div class="item">Regular Item C</div>
</div>
<h2>Test 2: With handle</h2>
<div class="list" id="list2">
  <div class="item"><span class="handle">::</span> Regular A</div>
  <div class="item meal"><span class="handle">::</span> Meal B</div>
  <div class="item"><span class="handle">::</span> Regular C</div>
</div>
<h2>Test 3: Simulated app structure</h2>
<div class="list" id="list3">
  <div class="itinerary-item"><span class="drag-handle">⠿</span> Regular 1</div>
  <div class="itinerary-item meal-breakfast"><span class="drag-handle">⠿</span><span class="item-meal-tag">breakfast</span> Meal 1</div>
  <div class="itinerary-item meal-lunch"><span class="drag-handle">⠿</span><span class="item-meal-tag">lunch</span> Meal 2</div>
</div>
<script>
new Sortable(document.getElementById('list1'), { animation: 200 });
new Sortable(document.getElementById('list2'), { animation: 200, handle: '.handle' });
new Sortable(document.getElementById('list3'), { animation: 200, handle: '.drag-handle' });
console.log('Sortable v' + Sortable.version + ' initialized');
</script>
</body></html>
